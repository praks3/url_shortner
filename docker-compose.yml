services:
  app:
    build: .
    image: url-shortener:local
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_URL: jdbc:postgresql://postgres:5432/urlshortener
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      APP_BASE_URL: http://localhost:8080
      APP_SHORT_CODE_LENGTH: "7"
      # Placeholder secret — override in any real deployment.
      APP_JWT_SECRET: change-me-compose-jwt-secret-min-256-bits-0123456789abcdef
      APP_JWT_EXPIRATION_MS: "3600000"
      APP_RATELIMIT_PUBLIC_RPM: "30"
      APP_RATELIMIT_AUTH_RPM: "200"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urlshortener"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:

spring.application.name=URL shortner

# Server
server.port=${SERVER_PORT:8080}

# DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/url_shortener}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# App config
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.short-code.length=${APP_SHORT_CODE_LENGTH:7}

# JWT
app.jwt.secret=${APP_JWT_SECRET:dev-only-secret-please-change-min-256-bits-1234567890abcdefghijkl}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# Rate limiting (per IP)
app.ratelimit.public.requests-per-minute=${APP_RATELIMIT_PUBLIC_RPM:30}
app.ratelimit.authenticated.requests-per-minute=${APP_RATELIMIT_AUTH_RPM:200}

# Async / scheduling executor
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=8
spring.task.execution.thread-name-prefix=app-async-

# Redis cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
